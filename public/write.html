<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - 게시판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>글쓰기</h1>
            <div class="header-actions">
                <div id="user-header"></div>
                <button onclick="location.href='index.html'" class="btn btn-secondary">목록으로</button>
            </div>
        </header>
        
        <main>
            <form id="write-form" class="write-form">
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" required maxlength="100" placeholder="제목을 입력하세요">
                </div>
                
                <div class="form-group">
                    <label for="content">내용</label>
                    <textarea id="content" name="content" required rows="10" placeholder="내용을 입력하세요"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">작성하기</button>
                    <button type="button" onclick="location.href='index.html'" class="btn btn-secondary">취소</button>
                </div>
            </form>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Auth required');
        }

        renderUserHeader('user-header');

        document.getElementById('write-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value
            };
            
            if (!data.title.trim() || !data.content.trim()) {
                alert('제목과 내용을 입력해주세요.');
                return;
            }
            
            try {
                const response = await authFetch('/api/posts', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert(result.message);
                    location.href = 'index.html';
                } else {
                    alert(result.message);
                }
            } catch (error) {
                if (error.message !== 'Unauthorized') {
                    console.error('게시글 작성 오류:', error);
                    alert('게시글 작성에 실패했습니다.');
                }
            }
        });
    </script>
</body>
</html>
