<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo/logo.jpg">
    <link rel="apple-touch-icon" href="logo/logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="기록">
    <title>글쓰기 - 기록</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="app-tabs">
            <a href="index.html" class="app-tab active">기록</a>
            <a href="assets.html" class="app-tab">자산관리</a>
            <a href="cats.html" class="app-tab">고양이</a>
        </nav>

        <header>
            <h1>글쓰기</h1>
            <div class="header-actions">
                <div id="user-header"></div>
                <button onclick="location.href='index.html'" class="btn btn-secondary">목록으로</button>
            </div>
        </header>
        
        <main>
            <form id="write-form" class="write-form">
                <div class="form-group">
                    <label for="category">카테고리</label>
                    <select id="category" name="category" required></select>
                </div>

                <div id="photo-section" class="photo-section" style="display: none;">
                    <div class="form-group">
                        <label for="images">사진</label>
                        <input type="file" id="images" name="images" accept="image/jpeg,image/png,image/webp,image/gif" multiple>
                        <p class="form-help">사진이 메인입니다. JPG, PNG, WEBP, GIF / 최대 20장</p>
                    </div>
                    <div id="image-preview-list" class="photo-preview-list"></div>
                </div>

                <div class="form-group">
                    <label for="title" id="title-label">제목</label>
                    <input type="text" id="title" name="title" required maxlength="100" placeholder="제목을 입력하세요">
                </div>
                
                <div class="form-group">
                    <label for="content" id="content-label">내용</label>
                    <textarea id="content" name="content" required rows="10" placeholder="내용을 입력하세요"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">작성하기</button>
                    <button type="button" onclick="location.href='index.html'" class="btn btn-secondary">취소</button>
                </div>
            </form>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Auth required');
        }

        renderUserHeader('user-header');

        let selectedFiles = [];

        const defaultCategory = new URLSearchParams(window.location.search).get('category') || '생각들';
        const initialCategory = POST_CATEGORIES.includes(defaultCategory) ? defaultCategory : '생각들';

        renderCategorySelect('category', initialCategory, handleCategoryChange);
        updatePostFormByCategory(initialCategory);
        renderSelectedPreviews();

        document.getElementById('images').addEventListener('change', function() {
            const newFiles = readImageFiles(this);
            selectedFiles = selectedFiles.concat(newFiles);
            this.value = '';
            renderSelectedPreviews();
        });

        function handleCategoryChange(category) {
            updatePostFormByCategory(category);
            if (!isPhotoCategory(category)) {
                selectedFiles = [];
                renderSelectedPreviews();
            }
        }

        function renderSelectedPreviews() {
            const items = selectedFiles.map((file, index) => ({
                previewUrl: URL.createObjectURL(file),
                index
            }));

            renderImagePreviewList(
                document.getElementById('image-preview-list'),
                items,
                removeSelectedFile
            );
        }

        function removeSelectedFile(index) {
            selectedFiles.splice(index, 1);
            renderSelectedPreviews();
        }

        document.getElementById('write-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            if (isPhotoCategory(category) && selectedFiles.length === 0) {
                alert('사진을 1장 이상 선택해주세요.');
                return;
            }

            if (!isPhotoCategory(category) && (!title.trim() || !content.trim())) {
                alert('제목과 내용을 입력해주세요.');
                return;
            }

            const formData = buildPostFormData({
                category,
                title,
                content
            }, selectedFiles);

            try {
                const response = await authFetch('/api/posts', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                    location.href = category
                        ? `index.html?category=${encodeURIComponent(category)}`
                        : 'index.html';
                } else {
                    alert(result.message);
                }
            } catch (error) {
                if (error.message !== 'Unauthorized') {
                    console.error('게시글 작성 오류:', error);
                    alert('게시글 작성에 실패했습니다.');
                }
            }
        });
    </script>
</body>
</html>
