<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo/logo.jpg">
    <link rel="apple-touch-icon" href="logo/logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="게시판">
    <title>게시글 수정 - 게시판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="app-tabs">
            <a href="index.html" class="app-tab active">게시판</a>
            <a href="assets.html" class="app-tab">자산관리</a>
        </nav>

        <header>
            <h1>게시글 수정</h1>
            <div class="header-actions">
                <div id="user-header"></div>
                <button onclick="goBack()" class="btn btn-secondary">뒤로가기</button>
            </div>
        </header>
        
        <main>
            <div id="loading" class="loading">
                게시글을 불러오는 중...
            </div>
            
            <form id="edit-form" class="edit-form" style="display: none;">
                <div class="form-group">
                    <label for="category">카테고리</label>
                    <select id="category" name="category" required></select>
                </div>

                <div id="photo-section" class="photo-section" style="display: none;">
                    <div class="form-group">
                        <label>기존 사진</label>
                        <div id="existing-image-list" class="photo-preview-list"></div>
                    </div>
                    <div class="form-group">
                        <label for="images">사진 추가</label>
                        <input type="file" id="images" name="images" accept="image/jpeg,image/png,image/webp,image/gif" multiple>
                        <p class="form-help">사진이 메인입니다. JPG, PNG, WEBP, GIF / 최대 20장</p>
                    </div>
                    <div id="new-image-preview-list" class="photo-preview-list"></div>
                </div>

                <div class="form-group">
                    <label for="title" id="title-label">제목</label>
                    <input type="text" id="title" name="title" required maxlength="100" placeholder="제목을 입력하세요">
                </div>
                
                <div class="form-group">
                    <label for="content" id="content-label">내용</label>
                    <textarea id="content" name="content" required rows="10" placeholder="내용을 입력하세요"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">수정하기</button>
                    <button type="button" onclick="goBack()" class="btn btn-secondary">취소</button>
                </div>
            </form>
            
            <div id="error-message" style="display: none; text-align: center; padding: 60px 20px; color: #ff6b6b;">
                <h3 id="error-text">게시글을 찾을 수 없습니다.</h3>
                <button onclick="location.href='index.html'" class="btn btn-secondary" style="margin-top: 20px;">목록으로 돌아가기</button>
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        let currentPost = null;
        const currentUser = getUser();
        let keepImages = [];
        let newFiles = [];

        if (!requireAuth()) {
            throw new Error('Auth required');
        }

        renderUserHeader('user-header');

        function getPostId() {
            return new URLSearchParams(window.location.search).get('id');
        }

        async function loadPost() {
            const postId = getPostId();
            if (!postId) {
                showError('게시글을 찾을 수 없습니다.');
                return;
            }

            try {
                const response = await authFetch(`/api/posts/${postId}`);
                const post = await response.json();

                if (response.ok) {
                    if (!canModifyPost(currentUser, post)) {
                        showError('수정 권한이 없습니다.');
                        return;
                    }
                    currentPost = post;
                    displayPost(post);
                } else {
                    showError(post.message || '게시글을 찾을 수 없습니다.');
                }
            } catch (error) {
                if (error.message !== 'Unauthorized') {
                    console.error('게시글 로드 오류:', error);
                    showError('게시글을 불러오지 못했습니다.');
                }
            }
        }

        function displayPost(post) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('edit-form').style.display = 'block';
            renderCategorySelect('category', post.category || '생각들', handleCategoryChange);
            document.getElementById('title').value = post.title;
            document.getElementById('content').value = post.content;
            keepImages = [...(post.images || [])];
            newFiles = [];
            updatePostFormByCategory(post.category || '생각들');
            renderExistingImages();
            renderNewPreviews();
        }

        function handleCategoryChange(category) {
            updatePostFormByCategory(category);
            if (!isPhotoCategory(category)) {
                keepImages = [];
                newFiles = [];
                renderExistingImages();
                renderNewPreviews();
            }
        }

        function renderExistingImages() {
            const items = keepImages.map((url, index) => ({
                previewUrl: url,
                index
            }));

            renderImagePreviewList(
                document.getElementById('existing-image-list'),
                items,
                removeExistingImage
            );
        }

        function renderNewPreviews() {
            const items = newFiles.map((file, index) => ({
                previewUrl: URL.createObjectURL(file),
                index
            }));

            renderImagePreviewList(
                document.getElementById('new-image-preview-list'),
                items,
                removeNewFile
            );
        }

        function removeExistingImage(index) {
            keepImages.splice(index, 1);
            renderExistingImages();
        }

        function removeNewFile(index) {
            newFiles.splice(index, 1);
            renderNewPreviews();
        }

        document.getElementById('images').addEventListener('change', function() {
            const files = readImageFiles(this);
            newFiles = newFiles.concat(files);
            this.value = '';
            renderNewPreviews();
        });

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-text').textContent = message;
            document.getElementById('error-message').style.display = 'block';
        }

        function goBack() {
            if (currentPost) {
                location.href = `view.html?id=${currentPost.id}`;
            } else {
                location.href = 'index.html';
            }
        }

        document.getElementById('edit-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            if (isPhotoCategory(category) && keepImages.length + newFiles.length === 0) {
                alert('사진을 1장 이상 남겨주세요.');
                return;
            }

            if (!isPhotoCategory(category) && (!title.trim() || !content.trim())) {
                alert('제목과 내용을 입력해주세요.');
                return;
            }

            const formData = buildPostFormData({
                category,
                title,
                content,
                keep_images: JSON.stringify(keepImages)
            }, newFiles);

            try {
                const response = await authFetch(`/api/posts/${currentPost.id}`, {
                    method: 'PUT',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                    location.href = `view.html?id=${currentPost.id}`;
                } else {
                    alert(result.message);
                }
            } catch (error) {
                if (error.message !== 'Unauthorized') {
                    console.error('게시글 수정 오류:', error);
                    alert('게시글 수정에 실패했습니다.');
                }
            }
        });

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>
