<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 게시판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>회원가입</h1>
        </header>

        <main>
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="50" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <input type="password" id="password-confirm" name="password-confirm" required minlength="6" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required maxlength="50" placeholder="게시글에 표시될 이름">
                </div>

                <div id="register-result" class="auth-result"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">가입하기</button>
                </div>

                <p class="auth-link">
                    이미 계정이 있으신가요? <a href="login.html">로그인</a>
                </p>
            </form>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        redirectIfLoggedIn();

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const name = document.getElementById('name').value.trim();
            const resultDiv = document.getElementById('register-result');

            if (password !== passwordConfirm) {
                resultDiv.textContent = '비밀번호가 일치하지 않습니다.';
                resultDiv.className = 'auth-result error';
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, name })
                });

                const result = await response.json();

                if (response.ok) {
                    saveAuth(result.token, result.user);
                    alert(result.message);
                    window.location.href = 'index.html';
                } else {
                    resultDiv.textContent = result.message;
                    resultDiv.className = 'auth-result error';
                }
            } catch (error) {
                console.error('회원가입 오류:', error);
                resultDiv.textContent = '회원가입에 실패했습니다.';
                resultDiv.className = 'auth-result error';
            }
        });
    </script>
</body>
</html>
