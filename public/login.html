<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo/logo.jpg">
    <link rel="apple-touch-icon" href="logo/logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="기록">
    <title>로그인 - 기록</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>로그인</h1>
        </header>

        <main>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <div id="login-result" class="auth-result"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">로그인</button>
                </div>

                <p class="auth-link">
                    계정이 없으신가요? <span class="auth-link-disabled" title="현재 회원가입이 잠시 중단되었습니다.">회원가입 (중단됨)</span>
                </p>
            </form>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        redirectIfLoggedIn();

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('login-result');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    saveAuth(result.token, result.user);
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || 'index.html';
                    window.location.href = redirect;
                } else {
                    resultDiv.textContent = result.message;
                    resultDiv.className = 'auth-result error';
                }
            } catch (error) {
                console.error('로그인 오류:', error);
                resultDiv.textContent = '로그인에 실패했습니다.';
                resultDiv.className = 'auth-result error';
            }
        });
    </script>
</body>
</html>
