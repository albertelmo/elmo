<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo/logo.jpg">
    <link rel="apple-touch-icon" href="logo/logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="게시판">
    <title>자산 입력 - 게시판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="app-tabs">
            <a href="index.html" class="app-tab">게시판</a>
            <a href="assets.html" class="app-tab active">자산관리</a>
        </nav>

        <header>
            <h1 id="page-title">자산 입력</h1>
            <div class="header-actions">
                <div id="user-header"></div>
                <button onclick="location.href='assets.html'" class="btn btn-secondary">목록으로</button>
            </div>
        </header>

        <main>
            <form id="asset-form" class="write-form">
                <div class="form-group">
                    <label for="recorded-at">입력일</label>
                    <input type="date" id="recorded-at" required>
                </div>

                <div class="form-group">
                    <label for="usd-krw">달러환율 (원/USD)</label>
                    <input type="text" id="usd-krw" inputmode="decimal" placeholder="예: 1,380.50" required>
                </div>

                <div class="form-group">
                    <label for="note">메모 (선택)</label>
                    <textarea id="note" rows="2" placeholder="메모를 입력하세요 (선택)"></textarea>
                </div>

                <div id="owner-sections"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">저장</button>
                    <button type="button" class="btn btn-secondary" onclick="location.href='assets.html'">취소</button>
                </div>
            </form>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="assets.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Auth required');
        }

        renderUserHeader('user-header');

        const editingId = new URLSearchParams(window.location.search).get('id');

        renderOwnerSections();

        if (editingId) {
            document.getElementById('page-title').textContent = '자산 수정';
            loadSnapshot(editingId);
        } else {
            document.getElementById('recorded-at').value = getKstDateString();
        }

        function renderOwnerSections() {
            const container = document.getElementById('owner-sections');

            container.innerHTML = ASSET_OWNERS.map(owner => `
                <div class="asset-owner-section">
                    <h3 class="asset-owner-title">${owner.label}</h3>
                    ${ASSET_TYPE_DEFS.map(type => renderTypeBlock(owner.key, type)).join('')}
                </div>
            `).join('');

            document.querySelectorAll('.asset-type-block').forEach(block => {
                addEntryRow(block, {});
            });

            container.addEventListener('input', handleContainerInput);
            container.addEventListener('click', handleContainerClick);

            const usdKrwInput = document.getElementById('usd-krw');
            attachThousandsFormatting(usdKrwInput);
            usdKrwInput.addEventListener('input', updateForeignPreviews);
        }

        function renderTypeBlock(ownerKey, type) {
            return `
                <div class="asset-type-block" data-owner="${ownerKey}" data-type="${type.key}">
                    <div class="asset-type-header">
                        <span class="asset-type-title">${type.label}</span>
                        <button type="button" class="entry-add-btn">+ 항목 추가</button>
                    </div>
                    <div class="asset-type-rows"></div>
                </div>
            `;
        }

        function renderEntryRowHtml(ownerKey, type) {
            if (type.isForeign) {
                return `
                    <div class="asset-entry-row" data-owner="${ownerKey}" data-type="${type.key}">
                        <input type="text" class="entry-label-input" placeholder="세부항목 (선택, 예: 연금)">
                        <input type="text" class="amount-usd-input" inputmode="decimal" placeholder="달러 금액 ($)">
                        <div class="computed-krw">≈ 0원</div>
                        <input type="number" class="return-rate-input" step="0.01" placeholder="수익률 (%)">
                        <button type="button" class="entry-remove-btn" title="삭제">✕</button>
                    </div>
                `;
            }

            return `
                <div class="asset-entry-row" data-owner="${ownerKey}" data-type="${type.key}">
                    <input type="text" class="entry-label-input" placeholder="세부항목 (선택, 예: 연금)">
                    <input type="text" class="amount-krw-input" inputmode="decimal" placeholder="금액 (원)">
                    ${type.hasReturnRate ? `<input type="number" class="return-rate-input" step="0.01" placeholder="수익률 (%)">` : '<div class="asset-entry-spacer"></div>'}
                    <button type="button" class="entry-remove-btn" title="삭제">✕</button>
                </div>
            `;
        }

        function addEntryRow(block, entry) {
            const ownerKey = block.dataset.owner;
            const type = getAssetTypeDef(block.dataset.type);
            const rowsContainer = block.querySelector('.asset-type-rows');
            rowsContainer.insertAdjacentHTML('beforeend', renderEntryRowHtml(ownerKey, type));
            fillRow(rowsContainer.lastElementChild, type, entry);
        }

        function fillRow(row, type, entry) {
            const labelInput = row.querySelector('.entry-label-input');
            if (labelInput) {
                labelInput.value = entry.label || '';
            }

            if (type.isForeign) {
                const usdInput = row.querySelector('.amount-usd-input');
                if (usdInput && entry.amount_usd !== undefined) {
                    setNumberInputValue(usdInput, entry.amount_usd);
                }
                updateForeignPreviewForRow(row);
            } else {
                const krwInput = row.querySelector('.amount-krw-input');
                if (krwInput && entry.amount_krw !== undefined) {
                    setNumberInputValue(krwInput, entry.amount_krw);
                }
            }

            const rateInput = row.querySelector('.return-rate-input');
            if (rateInput && entry.return_rate !== undefined && entry.return_rate !== null) {
                rateInput.value = entry.return_rate;
            }
        }

        function handleContainerInput(event) {
            const target = event.target;

            if (target.classList.contains('amount-usd-input') || target.classList.contains('amount-krw-input')) {
                const cursorFromEnd = target.value.length - target.selectionStart;
                const formatted = formatNumberWithCommas(target.value);
                target.value = formatted;
                const nextPos = Math.max(0, formatted.length - cursorFromEnd);
                target.setSelectionRange(nextPos, nextPos);
            }

            if (target.classList.contains('amount-usd-input')) {
                updateForeignPreviewForRow(target.closest('.asset-entry-row'));
            }
        }

        function handleContainerClick(event) {
            const addBtn = event.target.closest('.entry-add-btn');
            if (addBtn) {
                addEntryRow(addBtn.closest('.asset-type-block'), {});
                return;
            }

            const removeBtn = event.target.closest('.entry-remove-btn');
            if (removeBtn) {
                removeBtn.closest('.asset-entry-row').remove();
            }
        }

        function updateForeignPreviews() {
            document.querySelectorAll('.asset-entry-row[data-type="foreign"]').forEach(updateForeignPreviewForRow);
        }

        function updateForeignPreviewForRow(row) {
            if (!row) {
                return;
            }
            const usdInput = row.querySelector('.amount-usd-input');
            const computedEl = row.querySelector('.computed-krw');
            if (!usdInput || !computedEl) {
                return;
            }
            const usdKrw = getNumericInputValue(document.getElementById('usd-krw'));
            const usdAmount = getNumericInputValue(usdInput);
            const krwAmount = Math.round(usdAmount * usdKrw);
            computedEl.textContent = `≈ ${formatKrw(krwAmount)}`;
        }

        async function loadSnapshot(id) {
            try {
                const response = await authFetch(`/api/assets/snapshots/${id}`);
                const snapshot = await response.json();

                if (!response.ok) {
                    alert(snapshot.message || '자산 정보를 불러오지 못했습니다.');
                    location.href = 'assets.html';
                    return;
                }

                fillForm(snapshot);
            } catch (error) {
                if (error.message !== 'Unauthorized') {
                    console.error('자산 정보 로드 오류:', error);
                    alert('자산 정보를 불러오지 못했습니다.');
                }
            }
        }

        function fillForm(snapshot) {
            document.getElementById('recorded-at').value = String(snapshot.recorded_at).substring(0, 10);
            setNumberInputValue(document.getElementById('usd-krw'), snapshot.usd_krw);
            document.getElementById('note').value = snapshot.note || '';

            const grouped = new Map();
            (snapshot.entries || []).forEach(entry => {
                const key = `${entry.owner}|${entry.asset_type}`;
                if (!grouped.has(key)) {
                    grouped.set(key, []);
                }
                grouped.get(key).push(entry);
            });

            document.querySelectorAll('.asset-type-block').forEach(block => {
                block.querySelector('.asset-type-rows').innerHTML = '';
                const key = `${block.dataset.owner}|${block.dataset.type}`;
                const entries = grouped.get(key) || [];

                if (entries.length === 0) {
                    addEntryRow(block, {});
                } else {
                    entries.forEach(entry => addEntryRow(block, entry));
                }
            });
        }

        function collectEntries() {
            const entries = [];

            document.querySelectorAll('.asset-entry-row').forEach(row => {
                const owner = row.dataset.owner;
                const assetType = row.dataset.type;
                const type = getAssetTypeDef(assetType);
                const labelInput = row.querySelector('.entry-label-input');
                const label = labelInput ? labelInput.value.trim() : '';
                const rateInput = row.querySelector('.return-rate-input');
                const returnRate = rateInput && rateInput.value !== '' ? Number(rateInput.value) : null;

                if (type.isForeign) {
                    const usdInput = row.querySelector('.amount-usd-input');
                    const amountUsd = getNumericInputValue(usdInput);
                    if (amountUsd > 0) {
                        entries.push({ owner, assetType, label, amountUsd, returnRate });
                    }
                } else {
                    const krwInput = row.querySelector('.amount-krw-input');
                    const amountKrw = getNumericInputValue(krwInput);
                    if (amountKrw > 0) {
                        entries.push({ owner, assetType, label, amountKrw, returnRate });
                    }
                }
            });

            return entries;
        }

        document.getElementById('asset-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const recordedAt = document.getElementById('recorded-at').value;
            const usdKrw = getNumericInputValue(document.getElementById('usd-krw'));
            const note = document.getElementById('note').value;
            const entries = collectEntries();

            if (entries.length === 0) {
                alert('자산을 1개 이상 입력해주세요.');
                return;
            }

            const payload = { recordedAt, usdKrw, note, entries };

            try {
                const response = await authFetch(
                    editingId ? `/api/assets/snapshots/${editingId}` : '/api/assets/snapshots',
                    {
                        method: editingId ? 'PUT' : 'POST',
                        body: JSON.stringify(payload)
                    }
                );

                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                    location.href = 'assets.html';
                } else {
                    alert(result.message);
                }
            } catch (error) {
                if (error.message !== 'Unauthorized') {
                    console.error('자산 저장 오류:', error);
                    alert('자산 정보를 저장하지 못했습니다.');
                }
            }
        });
    </script>
</body>
</html>
