<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>게시판</h1>
            <div class="header-actions">
                <div id="user-header"></div>
                <button onclick="goWrite()" class="btn btn-primary">글쓰기</button>
            </div>
        </header>
        
        <main>
            <div class="board-header">
                <div id="category-tabs" class="category-tabs"></div>
                <div class="board-info">
                    <span id="category-label">전체</span> 게시글: <span id="total-count">0</span>개
                </div>
            </div>
            
            <div class="posts-container">
                <div id="posts-list" class="posts-list"></div>
                
                <div id="loading" class="loading">
                    게시글을 불러오는 중...
                </div>
                
                <div id="no-posts" class="no-posts" style="display: none;">
                    <p>등록된 게시글이 없습니다.</p>
                    <button onclick="goWrite()" class="btn btn-primary">첫 게시글 작성하기</button>
                </div>
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Auth required');
        }

        renderUserHeader('user-header');

        let currentCategory = new URLSearchParams(window.location.search).get('category') || '';

        if (currentCategory && !POST_CATEGORIES.includes(currentCategory)) {
            currentCategory = '';
        }

        renderCategoryTabs('category-tabs', currentCategory, selectCategory);

        function selectCategory(category) {
            currentCategory = category;
            const url = category ? `index.html?category=${encodeURIComponent(category)}` : 'index.html';
            history.replaceState(null, '', url);
            renderCategoryTabs('category-tabs', currentCategory, selectCategory);
            loadPosts();
        }

        function goWrite() {
            const url = currentCategory
                ? `write.html?category=${encodeURIComponent(currentCategory)}`
                : 'write.html';
            location.href = url;
        }

        async function loadPosts() {
            const postsList = document.getElementById('posts-list');
            const loading = document.getElementById('loading');
            const noPosts = document.getElementById('no-posts');
            const totalCount = document.getElementById('total-count');
            const categoryLabel = document.getElementById('category-label');

            postsList.innerHTML = '';
            loading.style.display = 'block';
            noPosts.style.display = 'none';
            categoryLabel.textContent = currentCategory || '전체';

            try {
                const url = currentCategory
                    ? `/api/posts?category=${encodeURIComponent(currentCategory)}`
                    : '/api/posts';
                const response = await authFetch(url);
                const posts = await response.json();
                
                loading.style.display = 'none';
                totalCount.textContent = posts.length;
                
                if (posts.length === 0) {
                    noPosts.style.display = 'block';
                    return;
                }
                
                let html = '';
                posts.forEach(post => {
                    const itemClass = isPhotoCategory(post.category) ? 'post-item photo-post' : 'post-item';
                    html += '<div class="' + itemClass + '" onclick="viewPost(\'' + post.id + '\')">';
                    html += '<div class="post-header">';
                    html += '<div class="post-title-row">';
                    html += renderCategoryBadge(post.category);
                    html += '<h3 class="post-title">' + escapeHtml(post.title) + '</h3>';
                    html += '</div>';
                    html += '<div class="post-meta">';
                    html += '<span class="author">' + escapeHtml(post.author) + '</span>';
                    html += '<span class="date">' + formatDate(post.created_at) + '</span>';
                    html += '<span class="views">조회 ' + (post.views || 0) + '</span>';
                    html += '</div></div>';
                    html += renderPostPreview(post);
                    html += '</div>';
                });
                postsList.innerHTML = html;
                
            } catch (error) {
                if (error.message !== 'Unauthorized') {
                    console.error('게시글 로드 오류:', error);
                    loading.innerHTML = '게시글을 불러오는데 실패했습니다.';
                }
            }
        }
        
        function viewPost(id) {
            location.href = 'view.html?id=' + id;
        }
        
        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>
</html>
