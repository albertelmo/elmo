<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>게시글 보기 - 게시판</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><header><h1>게시글 보기</h1><button onclick="location.href='index.html'" class="btn btn-secondary">목록으로</button></header><main><div id="loading" class="loading">게시글을 불러오는 중...</div><div id="post-detail" class="post-detail" style="display: none;"><div class="post-detail-header"><h2 id="post-title" class="post-detail-title"></h2><div id="post-meta" class="post-detail-meta"></div></div><div id="post-content" class="post-detail-content"></div><div class="post-actions"><button onclick="editPost()" class="btn btn-primary">수정</button><button onclick="deletePost()" class="btn btn-danger">삭제</button></div></div><div id="error-message" style="display: none; text-align: center; padding: 60px 20px; color: #ff6b6b;"><h3>게시글을 찾을 수 없습니다.</h3><button onclick="location.href='index.html'" class="btn btn-secondary" style="margin-top: 20px;">목록으로 돌아가기</button></div></main></div><script>let currentPost = null;function getPostId(){const urlParams = new URLSearchParams(window.location.search);return urlParams.get('id');}async function loadPost(){const postId = getPostId();if(!postId){showError();return;}try{const response = await fetch(`/api/posts/${postId}`);const post = await response.json();if(response.ok){currentPost = post;displayPost(post);}else{showError();}}catch(error){console.error('게시글 로드 오류:',error);showError();}}function displayPost(post){document.getElementById('loading').style.display = 'none';document.getElementById('post-detail').style.display = 'block';document.getElementById('post-title').textContent = post.title;document.getElementById('post-content').textContent = post.content;const meta = document.getElementById('post-meta');meta.innerHTML = `<span>작성자: ${escapeHtml(post.author)}</span><span>작성일: ${formatDate(post.created_at)}</span><span>조회수: ${post.views||0}</span>${post.updated_at!==post.created_at?`<span>수정일: ${formatDate(post.updated_at)}</span>`:''}`;}function showError(){document.getElementById('loading').style.display = 'none';document.getElementById('error-message').style.display = 'block';}function editPost(){if(currentPost){location.href = `edit.html?id=${currentPost.id}`;}}async function deletePost(){if(!currentPost)return;if(!confirm('정말로 이 게시글을 삭제하시겠습니까?')){return;}try{const response = await fetch(`/api/posts/${currentPost.id}`,{method:'DELETE'});const result = await response.json();if(response.ok){alert(result.message);location.href = 'index.html';}else{alert(result.message);}}catch(error){console.error('게시글 삭제 오류:',error);alert('게시글 삭제에 실패했습니다.');}}function escapeHtml(text){const div = document.createElement('div');div.textContent = text;return div.innerHTML;}function formatDate(dateString){const date = new Date(dateString);return date.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}document.addEventListener('DOMContentLoaded',loadPost);</script></body></html>
